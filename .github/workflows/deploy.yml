name: Build and Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Node 18
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install dependencies
      run: npm install

    - name: Build React app
      run: npm run build
      env:
        REACT_APP_API_URL: http://${{ secrets.SERVER_IP }}:8080

    - name: Build Docker image
      run: docker build -t ${{ secrets.DOCKER_USERNAME }}/mexcelflix-frontend:latest .

    - name: Login to DockerHub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Push to DockerHub
      run: docker push ${{ secrets.DOCKER_USERNAME }}/mexcelflix-frontend:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.7
      with:
        host: ${{ secrets.SERVER_IP }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/mexcelflix-frontend:latest
          docker stop mexcelflix-frontend || true
          docker rm mexcelflix-frontend || true
          docker run -d \
            --name mexcelflix-frontend \
            -p 3000:80 \
            ${{ secrets.DOCKER_USERNAME }}/mexcelflix-frontend:latest